services:
  db:
    image: postgres:17-alpine
    container_name: ml-playground-db
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ml-playground-backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app/backend
      - ./ml_core:/app/ml_core
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ml-playground-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - frontend/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
